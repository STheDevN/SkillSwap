name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase-functions-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy create-jitsi-room
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy create-jitsi-room --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy send-notification
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-notification --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy create-daily-room
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy create-daily-room --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
